services:

  api:
    build: .
    command: >
      bash -c "echo 'FastAPI: http://localhost:8000/docs' && uvicorn api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  streamlit:
    build: .
    command: >
      bash -c "echo 'Streamlit: http://localhost:8501' && streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      # Use host.docker.internal so the streamlit container can reach a locally
      # running API without rebuilding images. This keeps your original package
      # versions unchanged and avoids rebuilding the api image here.
      - API_URL=http://host.docker.internal:8000/predict